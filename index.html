<!DOCTYPE html>
<html lang="en">

<head>
    <title>DTC 05 Landing Page</title>
    <meta name="comp1800 template" content="My 1800 App">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>

<body>
  <nav class="bg-gray-400 px-4 py-3">
    <div class="flex items-center justify-between flex-wrap gap-4">
      <a class="flex items-center gap-2 font-semibold text-black text-lg">
        <img src="./images/Hamburger_icon.png" class="h-9">SafeRide</a>
      <form class="flex items-center gap-2">
        <input class="px-3 py-1.5 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-400" type="search" placeholder="Search" aria-label="Search">
        <button class="px-4 py-1.5 border-2 border-gray-500 text-gray-600 font-bold rounded hover:bg-gray-500 hover:text-white transition" type="submit">Search</button>
      </form>
    </div>
  </nav>

  <div class="px-4 py-20 text-center">
    <img class="block mx-auto mb-6 w-36 h-36 object-cover rounded" src="./images/bus.jpg" alt="Bus">
    <h1 class="text-4xl font-bold mb-3">Welcome to Transit Safety!</h1>
    <div class="max-w-xl mx-auto">
      <h3 class="text-xl font-semibold mb-2">Take public transit to a new level.</h3>
      <p class="text-lg text-gray-600 mb-6">Let's make public transit a safer experience for everyone!</p>
      <div class="flex flex-col sm:flex-row justify-center gap-3">
        <button class="bg-gray-400 hover:bg-gray-400 text-black font-semibold px-6 py-3 rounded-lg transition">Login/Signup</button>
      </div>
    </div>
  </div>
    

    <script type="module" src="/src/main.js"></script>

</body>

</html>
