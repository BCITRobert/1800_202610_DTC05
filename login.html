<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project</title>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">


    <!-- Other libraries go here -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body>

    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>
    <!-- Stuff for body goes here -->

    <nav-bar></nav-bar>

    <!-- Login -->
    <div id="loginView">
        <h3 class="mb-4 text-center text-xl font-semibold">Login</h3>

        <form id="loginForm" novalidate class="space-y-4">
            <div>
                <input type="email" id="loginEmail" placeholder="Email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
                <input type="password" id="loginPassword" placeholder="Password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
                Login
            </button>
        </form>

        <small class="block mt-4 text-center text-gray-600">
            Don’t have an account?
            <a href="#" id="toSignup" class="text-blue-600 hover:underline">
                Sign up
            </a>
        </small>
    </div>

    <!-- Signup -->
    <div id="signupView" class="hidden">
        <h3 class="mb-4 text-center text-xl font-semibold">Sign Up</h3>

        <form id="signupForm" novalidate class="space-y-4">
            <div>
                <input type="text" id="signupName" placeholder="First and Last Name" aria-label="Full name" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500" />
            </div>

            <div>
                <input type="email" id="signupEmail" placeholder="Email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500" />
            </div>

            <div>
                <input type="password" id="signupPassword" placeholder="Password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500" />
            </div>

            <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">
                Create Account
            </button>
        </form>

        <small class="block mt-4 text-center text-gray-600">
            Already have an account?
            <a href="#" id="toLogin" class="text-green-600 hover:underline">
                Login
            </a>
        </small>
    </div>
    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Link to scripts of your own -->
    <script type="module" src="/src/firebaseConfig.js"></script>
    <script type="module" src="/src/authentication.js"></script>
    <script type="module" src="/src/loginSignup.js"></script>

</body>

</html>
