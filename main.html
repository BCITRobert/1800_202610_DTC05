<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project - Main</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- shared component definitions -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


</head>

<body>
    <!-- reuse the project navbar -->
    <nav-bar></nav-bar>
    <bottom-bar></bottom-bar>

    <h1 class="text-3xl text-center mt-40">Welcome to the main page. Only logged‑in users can see this.</p>
        <h1 class="text-3xl text-center mt10" id="welcomeMessage"></h1>

        <div id="routeGroup" class="flex flex-col">
            <p class="text-center">Let's take a look at others routes!</p>
        </div>

        <template id="routeTemp">
            <div class="flex border-gray-200 border-2 mx-auto w-4/5 flex-col rounded-md justify-evenly my-2 p-2">
                <div class="flex flex-row justify-between">
                    <h1 id="routeTitle" class="text-lg"></h1>
                    <p id="creater"></p>
                    <p id="timeStamp"></p>
                    <div>
                        <img src="./images/recommand-untoggle.svg" alt="recommand this route" id="recommand"
                        style="width: 30px;height: 30px;cursor: pointer;">
                        <p id="recommandCount">0</p>
                    </div>
                    <div>
                        <img src="./images/disrecommand-untoggle.svg" alt="disrecommand this route" id="disrecommand"
                        style="width: 30px;height: 30px;cursor: pointer;">
                        <p id="disrecommandCount">0</p>
                    </div>
                    
                </div>
                <br>
                <div class="flex flex-row">
                    <p id="routeDetail" class="mx-1"></p>
                    <p id="routeCommuteTime" class="mx-1"></p>
                    <p id="routeCrowdLevel" class="mx-1"></p>
                    <p id="routeRecomand" class="mx-1"></p>
                </div>
            </div>
        </template>

        <!-- scripts -->
        <script type="module" src="./src/components/navbar_component.js"></script>
        <script type="module" src="./src/components/bottom_component.js"></script>
        <script type="module" src="./src/app.js"></script>
        <script type="module" src="./src/main.js"></script>

        <script type="module">
            import { checkAuthState } from './src/authentication.js';
            checkAuthState();
        </script>

</body>

</html>
