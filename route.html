<!DOCTYPE html>
<html lang="en">

<head>
    <title>My BCIT Project - Create new route comment</title>
    <meta name="comp1800 template" content="My 1800 App">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- shared component definitions -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>



</head>

<body>
    <!-- reuse the project navbar -->
    <nav-bar></nav-bar>
    <bottom-bar></bottom-bar>


    <h1 id="welcome" class="text-center mt-3 text-2xl">Please login before adding new route</h1>
    <div id="routeGroup" class="flex flex-col">

    </div>
    <div id="container" class="hidden max-w-3xl mx-auto px-4 py-6">
        <img src="./images/add_icon.svg" alt="Add new route" id="addBtn" class="w-16 h-16 my-2 cursor-pointer mx-auto">
        <form id="inputForm" class="hidden space-y-6">
            <!-- Title -->
            <div>
                <label class="block mb-1 font-medium">* Route name</label>
                <input type="text" id="title" placeholder="Title"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Route info -->
            <div>
                <label class="block mb-1 font-medium">Route details</label>
                <textarea id="detail" rows="3"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-4 focus:ring-blue-500"></textarea>
            </div>


            <!-- Level -->
            <div>
                <label class="block mb-1 font-medium">What crowding level of the route?</label>
                <select id="crowdLevel"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option>Empty</option>
                    <option>Light</option>
                    <option>Moderate</option>
                    <option>Crowded</option>
                    <option>Packed</option>
                </select>
            </div>

            <!-- Season -->
            <div>
                <label class="block mb-1 font-medium">Your commute period are usually?</label>
                <button class="routeBtn" type="button" value="5:00 am ~ 7:00 am">5:00 am ~ 7:00 am</button>
                <button class="routeBtn" type="button" value="7:00 am ~ 9:00 am">7:00 am ~ 9:00 am</button>
                <button class="routeBtn" type="button" value="9:00 am ~ 11:00 pm">9:00 am ~ 11:00 pm</button>
                <button class="routeBtn" type="button" value="11:pm ~ 2:00 pm">11:pm ~ 2:00 pm</button>
                <button class="routeBtn" type="button" value="2:00 pm ~ 4:00 pm">2:00 pm ~ 4:00 pm</button>
                <button class="routeBtn" type="button" value="4:00 pm ~ 6:00 pm">4:00 pm ~ 6:00 pm</button>
                <button class="routeBtn" type="button" value="6:00 pm ~ 8:00 pm">6:00 pm ~ 8:00 pm</button>
                <button class="routeBtn" type="button" value="8:00 pm ~ 10:00 pm">8:00 pm ~ 10:00 pm</button>
            </div>

            <!-- Recommand
            <div>
                <label class="block mb-2 font-medium">Recommand this route</label>
                <div class="flex space-x-4">
                    <label class="flex items-center space-x-1">
                        <input type="radio" name="recommand" value="Yes" class="accent-blue-500">
                        <span>Yes</span>
                    </label>
                    <label class="flex items-center space-x-1">
                        <input type="radio" name="recommand" value="No" class="accent-blue-500">
                        <span>No</span>
                    </label>
                    <label class="flex items-center space-x-1">
                        <input type="radio" name="recommand" value="unsure" checked class="accent-blue-500">
                        <span>Not sure</span>
                    </label>
                </div>
            </div> -->

            <!-- Submit -->
            <div class="flex justify-end">
                <button type="button" id="submitBtn"
                    class="bg-gray-500 text-white px-6 py-2 rounded-lg text-lg hover:bg-blue-700 transition">
                    Submit
                </button>
            </div>
        </form>
    </div>

    <div id="thankYouModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-50">
        <!-- Modal box -->
        <div class="bg-white rounded-2xl shadow-lg w-full max-w-md mx-4">

            <!-- Header -->
            <div class="flex items-center justify-between px-4 py-3 border-b">
                <h5 id="thankYouLabel" class="text-lg font-semibold">
                    Thank You!
                </h5>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-xl">
                    &times;
                </button>
            </div>

            <!-- Body -->
            <div class="px-4 py-6 text-center">
                <p>Your review has been successfully submitted. 🌟</p>
            </div>

            <!-- Footer -->
            <div class="px-4 py-3 border-t flex justify-end">
                <button id="closeModalBtn2"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                    Close
                </button>
            </div>
        </div>
    </div>

    <template id="routeTemp">
        <div class="flex border-gray-200 border-2 mx-auto w-4/5 flex-col rounded-md justify-evenly my-2 p-2">
            <div class="flex flex-row justify-between">
                <h1 id="routeTitle" class="text-lg"></h1>
                <p id="timeStamp"></p>
                <img src="./images/delete.svg" alt="delet this route" id="deleteRoute"
                    style="width: 30px;height: 30px;cursor: pointer;">
            </div>
            <br>
            <div class="flex flex-row">
                <p id="routeDetail" class="mx-1"></p>
                <p id="routeCommuteTime" class="mx-1"></p>
                <p id="routeCrowdLevel" class="mx-1"></p>
                <p id="routeRecomand" class="mx-1"></p>
            </div>
        </div>
    </template>

    <!-- scripts -->
    <script type="module" src="./src/components/navbar_component.js"></script>
    <script type="module" src="./src/components/bottom_component.js"></script>
    <script type="module" src="./src/app.js"></script>
    <script type="module" src="./src/route.js"></script>

</body>

</html>
